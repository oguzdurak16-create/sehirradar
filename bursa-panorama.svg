  <path d="M1367 333L1405 310L1447 335L1415 346Z" fill="#f4e8d7" opacity=".9"/>
  <path d="M0 574C245 502 450 548 670 582C910 618 1160 520 1600 548V720H0Z" fill="#3c5a48"/>
  <path d="M0 625C250 575 465 628 705 650C1010 678 1265 585 1600 615V760H0Z" fill="#2d4939"/>

