<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Bursa ve Uludağ editoryal panoraması</title>
  <desc id="desc">Uludağ silueti, Bursa çatıları, tarihi kubbeler, minareler ve yeşil dokudan oluşan özgün vektör illüstrasyon.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e5b27f"/>
      <stop offset=".45" stop-color="#eec9a1"/>
      <stop offset="1" stop-color="#f3dbc0"/>
    </linearGradient>
    <linearGradient id="mountain" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#586f61"/>
      <stop offset="1" stop-color="#2c4638"/>
    </linearGradient>
    <linearGradient id="city" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9c563c"/>
      <stop offset="1" stop-color="#6e3427"/>
    </linearGradient>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency=".85" numOctaves="2" seed="12" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="gray"/>
      <feComponentTransfer in="gray" result="softNoise">
        <feFuncA type="table" tableValues="0 .08"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="softNoise" mode="multiply"/>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#sky)"/>
  <circle cx="1260" cy="185" r="92" fill="#f3d99f" opacity=".8"/>
