name: Saatlik şehir verisi güncelleme

on:
  schedule:
    - cron: "8 * * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/ingest.mjs"
      - "scripts/ensure-unique-slugs.mjs"
      - ".github/workflows/hourly-ingest.yml"

permissions:
  contents: write

concurrency:
  group: hourly-ingest-main
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    steps:
      - name: Depoyu al
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Bağımlılıkları kur
        run: npm ci

      - name: Resmî kaynakları tara
        env:
          INGEST_TIMEOUT_MS: "25000"
          INGEST_RETRIES: "3"
        run: npm run ingest

      - name: Veri yapısını doğrula
        run: npm run validate:data

      - name: Bozuk diff kontrolü
        run: git diff --check

      - name: Saatlik veriyi kaydet
        run: |
          git config user.name "sehir-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/content.json data/source-health.json

          if git diff --cached --quiet; then
            echo "Kaynaklarda veya kontrol zamanında değişiklik yok."
            exit 0
          fi

          git commit -m "data: saatlik Bursa şehir verisi güncellemesi"

          for attempt in 1 2 3; do
            if git pull --rebase origin main && git push origin HEAD:main; then
              echo "Saatlik veri main dalına gönderildi."
              exit 0
            fi
            git rebase --abort || true
            sleep $((attempt * 5))
          done

          echo "Veri commit'i üç denemede gönderilemedi."
          exit 1
