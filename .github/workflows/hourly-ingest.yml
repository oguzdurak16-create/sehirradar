name: Saatlik şehir verisi güncelleme
on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: hourly-ingest
  cancel-in-progress: false
jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Resmî kaynakları tara
        run: npm run ingest
      - name: Veri yapısını doğrula
        run: npm run validate:data
      - name: Değişiklik varsa kaydet
        run: |
          if git diff --quiet -- data/content.json; then
            echo "Yeni değişiklik yok."
            exit 0
          fi
          git config user.name "sehir-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/content.json
          git commit -m "data: saatlik şehir radarı güncellemesi"
          git push
