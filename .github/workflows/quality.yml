name: Kod ve veri kontrolü

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Veri toplayıcı söz dizimi
        run: |
          node --check scripts/ingest.mjs
          node --check scripts/extra-sources.mjs
          node --check scripts/correct-live-sources.mjs
          node --check scripts/normalize-content.mjs
          node --check scripts/ensure-unique-slugs.mjs
      - run: npm run validate:data
      - run: npm run lint
      - run: npm run build
