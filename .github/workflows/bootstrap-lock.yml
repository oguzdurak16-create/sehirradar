name: Package lock oluştur

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bootstrap-package-lock
  cancel-in-progress: false

jobs:
  lock:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Kilit dosyasını üret
        run: npm install --package-lock-only --ignore-scripts
      - name: Kilit dosyasını kaydet
        run: |
          if git diff --quiet -- package-lock.json && git ls-files --error-unmatch package-lock.json >/dev/null 2>&1; then
            echo "package-lock.json zaten güncel."
            exit 0
          fi
          git config user.name "sehir-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add package-lock.json
          git commit -m "build: package-lock dosyasını ekle"
          git push
