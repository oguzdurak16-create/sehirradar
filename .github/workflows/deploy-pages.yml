name: GitHub Pages saatlik yayın

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["Saatlik şehir verisi güncelleme"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 18
    env:
      GITHUB_PAGES: "true"
      NEXT_PUBLIC_SITE_URL: "https://oguzdurak16-create.github.io/sehirradar"
      NEXT_PUBLIC_BASE_PATH: "/sehirradar"
    steps:
      - name: Main dalındaki en güncel veriyi al
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Bağımlılıkları kur
        run: npm ci

      - name: Pages için sunucu rotalarını statikleştir
        run: |
          rm -rf app/api/v1/items
          mkdir -p app/api/v1/items
          cat > app/api/v1/items/route.ts <<'EOF'
          import { data, sortItems } from "@/lib/data";
          export const dynamic = "force-static";
          export function GET() {
            const items = sortItems(data.items);
            return Response.json({ generatedAt: data.generatedAt, city: data.city, count: items.length, items }, { headers: { "Access-Control-Allow-Origin": "*" } });
          }
          EOF
          rm -f app/opengraph-image.tsx
          python - <<'PY'
          from pathlib import Path
          for name in ["app/api/health/route.ts", "app/sitemap.ts", "app/robots.ts", "app/manifest.ts"]:
              path = Path(name)
              text = path.read_text()
              if 'export const dynamic = "force-static";' not in text:
                  path.write_text('export const dynamic = "force-static";\n' + text)
          manifest = Path("app/manifest.ts")
          text = manifest.read_text()
          text = text.replace('start_url: "/bugun"', 'start_url: "/sehirradar/bugun"')
          text = text.replace('scope: "/"', 'scope: "/sehirradar/"')
          manifest.write_text(text)
          PY

      - name: Veriyi doğrula
        run: npm run validate:data

      - name: Statik siteyi üret
        run: npm run build

      - name: Yayın zamanını kaydet
        run: |
          touch out/.nojekyll
          printf '{"publishedAt":"%s","source":"main"}\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > out/deployment-status.json

      - name: gh-pages dalına yayınla
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "deploy: saatlik şehir verisi ${{ github.run_id }}"
