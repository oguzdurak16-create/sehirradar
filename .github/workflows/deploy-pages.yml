name: Canlı şehir verisi ve GitHub Pages yayını

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "data/**"
      - "README.md"

permissions:
  contents: write

concurrency:
  group: live-city-pipeline
  cancel-in-progress: false

jobs:
  ingest-build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 22
    env:
      GITHUB_PAGES: "true"
      NEXT_PUBLIC_SITE_URL: "https://oguzdurak16-create.github.io/sehirradar"
      NEXT_PUBLIC_BASE_PATH: "/sehirradar"
      INGEST_TIMEOUT_MS: "25000"
      INGEST_RETRIES: "3"
    steps:
      - name: Main dalını al
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Bağımlılıkları kur
        run: npm ci

      - name: Resmî kaynakları tara ve veriyi hazırla
        run: npm run ingest

      - name: Veri yapısını doğrula
        run: npm run validate:data

      - name: Pages için sunucu rotalarını statikleştir
        run: |
          rm -rf app/api/v1/items
          mkdir -p app/api/v1/items
          cat > app/api/v1/items/route.ts <<'EOF'
          import { data, sortItems } from "@/lib/data";
          export const dynamic = "force-static";
          export function GET() {
            const items = sortItems(data.items);
            return Response.json({ generatedAt: data.generatedAt, city: data.city, count: items.length, items }, { headers: { "Access-Control-Allow-Origin": "*" } });
          }
          EOF
          rm -f app/opengraph-image.tsx
          python - <<'PY'
          from pathlib import Path
          for name in ["app/api/health/route.ts", "app/sitemap.ts", "app/robots.ts", "app/manifest.ts"]:
              path = Path(name)
              text = path.read_text()
              if 'export const dynamic = "force-static";' not in text:
                  path.write_text('export const dynamic = "force-static";\n' + text)
          manifest = Path("app/manifest.ts")
          text = manifest.read_text()
          text = text.replace('start_url: "/bugun"', 'start_url: "/sehirradar/bugun"')
          text = text.replace('scope: "/"', 'scope: "/sehirradar/"')
          manifest.write_text(text)
          PY

      - name: Statik siteyi üret
        run: npm run build

      - name: Canlı veri ve yayın bilgisini ekle
        run: |
          touch out/.nojekyll
          cp data/content.json out/live-data.json
          cp data/source-health.json out/source-health.json
          GENERATED_AT=$(node -e 'const d=require("./data/content.json");process.stdout.write(d.generatedAt)')
          ITEM_COUNT=$(node -e 'const d=require("./data/content.json");process.stdout.write(String(d.items.length))')
          printf '{"publishedAt":"%s","generatedAt":"%s","itemCount":%s,"source":"scheduled-live-pipeline","runId":"%s"}\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "$GENERATED_AT" "$ITEM_COUNT" "${{ github.run_id }}" > out/deployment-status.json

      - name: gh-pages dalına doğrudan yayınla
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "deploy: canlı şehir verisi ${{ github.run_id }}"
